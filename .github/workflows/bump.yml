name: Bump polymarket-tui

# Keeps Formula/polymarket-tui.rb in sync with the latest PyPI release.
# Tokenless: the tap's own GITHUB_TOKEN commits the bump - no cross-repo
# credential needed. Runs daily, on manual dispatch, and on a
# repository_dispatch (type: pypi-release) if the app repo ever sends one
# for instant bumps.
on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [pypi-release]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump formula from PyPI
        id: bump
        run: python3 scripts/bump.py Formula/polymarket-tui.rb polymarket-tui
      - name: Commit if changed
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/polymarket-tui.rb
          git commit -m "polymarket-tui: bump to ${{ steps.bump.outputs.version }}"
          git push
